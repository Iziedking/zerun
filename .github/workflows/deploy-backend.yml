name: Deploy backend

# On every push that touches the backend or the deploy config, SSH to the VPS,
# pull, and rebuild the backend container. The frontend deploys separately
# through Vercel's own GitHub integration.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            git pull --ff-only
            docker compose -f deploy/docker-compose.prod.yml up -d --build
            docker image prune -f
